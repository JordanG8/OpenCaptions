<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenCaptions - כתוביות חכמות בעברית</title>
    <style>
        :root {
            --bg-color: #232323;
            --header-bg: #1d1d1d;
            --accent-color: #0078d4;
            --accent-hover: #005a9e;
            --text-color: #e0e0e0;
            --border-color: #3e3e3e;
            --input-bg: #2b2b2b;
            --success: #28a745;
            --error: #dc3545;
            --working: #ffc107;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            padding: 0;
            user-select: none;
            overflow-x: hidden;
            overflow-y: auto;
        }

        header {
            background-color: var(--header-bg);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo-area h1 {
            font-size: 14px;
            font-weight: bold;
            margin: 0;
            color: #fff;
        }

        .container {
            padding: 16px;
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-size: 11px;
            margin-bottom: 6px;
            color: #bbb;
        }

        .tooltip-container {
            display: inline-flex;
            align-items: center;
            position: relative;
        }

        .info-icon {
            display: inline-block;
            width: 14px;
            height: 14px;
            background: #444;
            border-radius: 50%;
            text-align: center;
            line-height: 14px;
            font-size: 10px;
            margin-right: 6px;
            cursor: help;
        }

        .info-icon:hover::after {
            content: attr(data-tooltip);
            position: absolute;
            bottom: 20px;
            right: 0;
            background: #444;
            color: #fff;
            padding: 6px 10px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
            z-index: 100;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        select, input[type="range"] {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border-color);
            color: #fff;
            padding: 6px;
            border-radius: 4px;
            outline: none;
        }

        .slider-box {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .slider-box span { font-size: 12px; font-weight: bold; width: 24px; }

        .checkbox-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .checkbox-row input {
            cursor: pointer;
        }

        /* Steps */
        .steps-container {
            display: flex;
            justify-content: space-between;
            margin-bottom: 16px;
            position: relative;
        }
        .steps-line {
            position: absolute;
            top: 10px; left: 0; right: 0;
            height: 2px; background: #3e3e3e;
            z-index: 1;
        }
        .step-pip {
            width: 22px; height: 22px;
            background: var(--bg-color);
            border: 2px solid #3e3e3e;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 10px; font-weight: bold;
            z-index: 2; color: #666; transition: all 0.3s;
        }
        .step-pip.active { border-color: var(--accent-color); color: var(--accent-color); box-shadow: 0 0 8px var(--accent-color); }
        .step-pip.done { background: var(--accent-color); border-color: var(--accent-color); color: #fff; }

        /* Buttons */
        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        button {
            padding: 10px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.2s;
        }

        #btn-generate { background-color: var(--accent-color); color: #fff; font-size: 13px; }
        #btn-generate:hover { background-color: var(--accent-hover); }
        #btn-generate:disabled { opacity: 0.5; cursor: not-allowed; }

        #btn-cancel { background-color: transparent; border: 1px solid #555; color: #ccc; display: none; }
        #btn-cancel:hover { background-color: #333; color: #fff; }

        #btn-refresh-tracks { background: none; border: 1px solid #444; font-size: 10px; padding: 4px 8px; margin-top: 4px; color: #999; }

        /* Log area */
        #log {
            margin-top: 16px;
            height: 120px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 8px;
            font-family: 'Consolas', monospace;
            font-size: 10px;
            overflow-y: auto;
            white-space: pre-wrap;
            color: #aaa;
        }
        .log-warn { color: #f1c40f; }
        .log-err { color: #e74c3c; font-weight: bold; }
        .log-ok { color: #2ecc71; }
        .log-py { color: #3498db; }

        .status-area {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 10px;
            font-size: 11px;
        }
        .status-badge {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #555;
        }
        .status-badge.ready { background: var(--success); }
        .status-badge.working { background: var(--working); box-shadow: 0 0 5px var(--working); }
        .status-badge.error { background: var(--error); }
        .status-badge.done { background: var(--success); }

        #btn-copy-log {
            float: left;
            background: none;
            border: 1px solid #333;
            color: #666;
            font-size: 9px;
            margin-top: 4px;
        }

    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <h1>OpenCaptions - עברית</h1>
        </div>
        <div class="status-area">
            <div id="status-badge" class="status-badge"></div>
            <span id="status-text">טוען...</span>
        </div>
    </header>

    <div class="container">
        
        <!-- Track Selection -->
        <div class="section">
            <label>
                בחר ערוץ סאונד לתמלול
                <span class="info-icon" data-tooltip="בחר את הערוץ שבו נמצא הקריינות שלך">i</span>
            </label>
            <select id="track-select">
                <option value="-1">כל הערוצים (Mix)</option>
            </select>
            <button id="btn-refresh-tracks">רענן ערוצים</button>
        </div>

        <!-- Density Slider -->
        <div class="section">
            <label>
                צפיפות מילים במקטע
                <span class="info-icon" data-tooltip="מספר המילים המקסימלי שיופיעו על המסך בבת אחת">i</span>
            </label>
            <div class="slider-box">
                <input type="range" id="words-slider" min="3" max="15" value="7">
                <span id="words-value">7</span>
            </div>
        </div>

        <!-- Options -->
        <div class="section">
            <label class="checkbox-row">
                <input type="checkbox" id="check-autoplace" checked>
                מקם אוטומטית על הטיימליין
                <span class="info-icon" data-tooltip="ייבוא הכתוביות ישירות לציר הזמן של הפרמייר">i</span>
            </label>
            
            <label class="checkbox-row">
                <input type="checkbox" id="check-rtl-fix" checked>
                תיקון פיסוק עברית (RTL Fix)
                <span class="info-icon" data-tooltip="מתקן סימני פיסוק (?!.) שקופצים לצד הלא נכון בעברית">i</span>
            </label>
        </div>

        <!-- Progress Steps -->
        <div class="steps-container">
            <div class="steps-line"></div>
            <div class="step-pip" data-step="1">1</div>
            <div class="step-pip" data-step="2">2</div>
            <div class="step-pip" data-step="3">3</div>
            <div class="step-pip" data-step="4">4</div>
        </div>

        <!-- Action Buttons -->
        <div class="btn-group">
            <button id="btn-generate">צור כתוביות (AI)</button>
            <button id="btn-cancel">עצור</button>
        </div>

        <!-- Console Log -->
        <div id="log">מוכן לעבודה.</div>
        <button id="btn-copy-log">העתק לוג</button>

    </div>

    <!-- Adobe Scripts -->
    <script src="CSInterface.js"></script>
    <script src="main.js"></script>
</body>
</html>
